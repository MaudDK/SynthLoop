model:
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  output_dir: "outputs/"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  quantize: true
  bits: 4
  compute_dtype: "bfloat16"
  quant_type: "nf4"
  double_quant: true

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation: 4
  learning_rate: 0.0001
  bf16: true
  max_length: 512

wandb:
  project: "synthloop"
  run_name: ""

data:
  dataset: ""
  split: "train"
  test_size: 0.2
  shuffle: true
  seed: 42
  cache_dir: "data/cache"
  processed_dir: "data/processed"